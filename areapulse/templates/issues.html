<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issues — AreaPulse</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=cabinet-grotesk@300,400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><div class="brand-dot"></div><span class="brand-name">AreaPulse</span><span class="brand-tag">Delhi</span></div>
  <div class="nav-center">
    <a href="/" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Live Map</a>
    <a href="/issues-page" class="nav-link active"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Issues</a>
    <a href="/leaderboard-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>Leaderboard</a>
    <a href="/ngo-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>NGOs</a>
    <a href="/community-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Community</a>
    <a href="/redeem-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Redeem</a>
  </div>
  <div class="nav-right"><div class="live-badge"><span class="live-dot"></span>Live</div></div>
</nav>

<div class="page-container">
  <div class="page-hero">
    <div><h1 class="page-title">All <span>Issues</span></h1><p class="page-subtitle">Browse, verify, and escalate civic problems reported across Delhi · Admin password: admin123</p></div>
    <div class="filter-bar">
      <select id="fa" onchange="applyF()"><option value="">All Areas</option></select>
      <select id="ft" onchange="applyF()"><option value="">All Tags</option><option>pothole</option><option>water</option><option>garbage</option><option>streetlight</option><option>traffic</option><option>noise</option><option>sewage</option><option>electricity</option><option>tree</option></select>
      <select id="fs" onchange="applyF()"><option value="">All Status</option><option value="open">Open</option><option value="verified">Verified</option><option value="resolved">Resolved</option><option value="escalated">Escalated</option></select>
      <div class="search-wrap"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="fq" type="text" placeholder="Search..." oninput="applyF()"></div>
    </div>
  </div>
  <div id="summary" class="issues-summary"></div>
  <div class="issues-grid" id="grid"><div class="loading-state"><div class="spinner"></div><p>Fetching issues...</p></div></div>
</div>

<div id="toast" class="toast"></div>
<div id="ngo-popup" class="ngo-popup" style="display:none"><div class="ngo-popup-inner"><div class="ngo-popup-header"><div><div class="ngo-popup-title">🎉 Issue Resolved! +20 pts</div><div class="ngo-popup-sub">Nearby NGOs that can help:</div></div><button onclick="closeNgoPop()" class="ngo-popup-close">×</button></div><div id="ngo-popup-list" class="ngo-popup-list"></div></div></div>
<div id="ngo-popup-overlay" class="ngo-popup-overlay" style="display:none" onclick="closeNgoPop()"></div>
<div id="lightbox" class="lightbox" style="display:none" onclick="closeLb(event)"><div class="lightbox-box"><button class="lightbox-close" onclick="closeLb()">×</button><img id="lb-img" src="" alt=""><div class="lightbox-caption" id="lb-cap"></div></div></div>

<script>
let allI=[],ngoReg={};
const IC={};
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3500);}
function tagColor(tag){const m={pothole:'#ff7c38',garbage:'#84cc16',streetlight:'#ffc94a',water:'#22d4e0',traffic:'#ff4069',noise:'#a78bfa',sewage:'#fb923c',electricity:'#facc15',tree:'#4ade80'};for(let k in m)if(tag&&tag.includes(k))return m[k];return'#7b86a0';}
function statusBadge(s){if(s==='resolved')return'<span class="badge resolved">✓ Resolved</span>';if(s==='verified')return'<span class="badge verified">● Verified</span>';if(s==='escalated')return'<span class="badge escalated">↑ Escalated</span>';return'<span class="badge open">○ Open</span>';}
function getNgo(tag){tag=(tag||'').toLowerCase();for(let k in ngoReg)if(k!=='default'&&tag.includes(k))return ngoReg[k];return null;}

async function loadAreas(){const a=await(await fetch('/areas')).json();const s=document.getElementById('fa');a.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;s.appendChild(o);});}

function applyF(){
  const a=document.getElementById('fa').value,t=document.getElementById('ft').value,s=document.getElementById('fs').value,q=document.getElementById('fq').value.toLowerCase();
  renderIssues(allI.filter(i=>{if(a&&i.area!==a)return false;if(t&&(i.tag||'')!==t)return false;if(s&&(i.status||'open')!==s)return false;if(q&&!i.description.toLowerCase().includes(q)&&!i.area.toLowerCase().includes(q)&&!(i.tag||'').toLowerCase().includes(q))return false;return true;}));
}

function renderIssues(data){
  const grid=document.getElementById('grid');
  if(!data.length){grid.innerHTML='<div class="empty-state"><strong>No issues match your filters.</strong></div>';return;}
  grid.innerHTML=data.slice().reverse().map(i=>{
    const ngo=getNgo(i.tag);
    const ngoHtml=ngo?`<div class="card-ngo"><div class="card-ngo-info"><span class="card-ngo-icon">${ngo.icon||'🏛️'}</span><span class="card-ngo-name">${ngo.name}</span></div><div class="card-ngo-actions"><a href="mailto:${ngo.contact||ngo.email||''}" class="card-ngo-btn">📧 Email</a><a href="tel:${ngo.phone}" class="card-ngo-btn">📞 Call</a><button class="card-ngo-btn escalate-btn" onclick="doEscalate(${i.id})">↑ Escalate</button></div></div>`:'';
    return`<div class="issue-card-full">
      <div class="issue-top"><div class="issue-area-tag"><span class="area-name">${i.area}</span><span class="tag-chip" style="background:${tagColor(i.tag)}18;color:${tagColor(i.tag)}">${i.tag||'other'}</span>${i.severity?`<span class="sev-badge ${i.severity}">${i.severity}</span>`:''}</div>${statusBadge(i.status)}</div>
      <p class="issue-desc">${i.description}</p>
      ${i.landmark?`<div style="font-size:11px;color:var(--text3);margin-bottom:5px">📍 ${i.landmark}</div>`:''}
      ${i.image?`<div class="issue-img-thumb" onclick="openLb(${i.id},'${i.area}')"><img src="${i.image}" alt="photo"><span class="issue-img-thumb-label">🔍 View photo</span></div>`:''}
      <div class="issue-footer">
        <span class="issue-reporter"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${i.user||'Anonymous'} · <span style="color:var(--text3)">${i.upvotes||0} votes</span></span>
        <div class="issue-actions"><button class="action-btn upvote" onclick="doUpvote(${i.id})"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>${i.upvotes||0}</button><button class="action-btn verify" onclick="doVerify(${i.id})">✓ Verify</button><button class="action-btn resolve" onclick="doResolve(${i.id})">✔ Resolve</button></div>
      </div>${ngoHtml}
    </div>`;
  }).join('');
}

async function load(){
  const [ir,nr]=await Promise.all([fetch('/issues'),fetch('/ngo/all')]);
  allI=await ir.json();
  // convert array NGOs to lookup by tag
  const ngoArr=await nr.json();
  if(Array.isArray(ngoArr)){ngoArr.forEach(n=>{if(!ngoReg[n.tag])ngoReg[n.tag]=n;});}else{ngoReg=ngoArr;}
  allI.forEach(i=>{if(i.image)IC[i.id]=i.image;});
  const open=allI.filter(i=>!i.status||i.status==='open').length;
  const resolved=allI.filter(i=>i.status==='resolved').length;
  const verified=allI.filter(i=>i.status==='verified').length;
  const esc=allI.filter(i=>i.status==='escalated').length;
  document.getElementById('summary').innerHTML=`<div class="summary-chips"><div class="summary-chip"><strong>${allI.length}</strong> Total</div><div class="summary-chip open-c"><strong>${open}</strong> Open</div><div class="summary-chip verified-c"><strong>${verified}</strong> Verified</div><div class="summary-chip resolved-c"><strong>${resolved}</strong> Resolved</div>${esc?`<div class="summary-chip"><strong style="color:var(--orange)">${esc}</strong> Escalated</div>`:''}</div>`;
  renderIssues(allI);
}

function openLb(id,cap){const s=IC[id];if(!s)return;document.getElementById('lb-img').src=s;document.getElementById('lb-cap').textContent=cap||'';document.getElementById('lightbox').style.display='flex';document.body.style.overflow='hidden';}
function closeLb(e){if(e&&e.target!==document.getElementById('lightbox')&&!e.target.classList.contains('lightbox-close'))return;document.getElementById('lightbox').style.display='none';document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('lightbox').style.display='none';document.body.style.overflow='';}});

function showNgoPop(ngos){document.getElementById('ngo-popup-list').innerHTML=ngos.map(n=>`<div class="ngo-popup-card"><div class="ngo-popup-card-left"><span style="font-size:20px">${n.icon||'🏛️'}</span><div><div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text)">${n.name}</div><div style="font-size:11px;color:var(--text2)">${n.focus}</div><div style="font-size:10px;color:var(--text3)">📍 ${n.address||''} · <span style="color:var(--accent)">${n.distance_km} km</span></div></div></div><div style="display:flex;gap:5px;flex-shrink:0"><a href="tel:${n.phone}" style="font-size:11px;font-weight:700;color:var(--green);text-decoration:none;border:1px solid rgba(31,209,138,0.25);padding:5px 9px;border-radius:6px;background:rgba(31,209,138,0.07)">📞</a><a href="mailto:${n.email||n.contact||''}" style="font-size:11px;font-weight:700;color:var(--accent);text-decoration:none;border:1px solid rgba(79,126,248,0.25);padding:5px 9px;border-radius:6px;background:rgba(79,126,248,0.07)">📧</a></div></div>`).join('');document.getElementById('ngo-popup').style.display='flex';document.getElementById('ngo-popup-overlay').style.display='block';}
function closeNgoPop(){document.getElementById('ngo-popup').style.display='none';document.getElementById('ngo-popup-overlay').style.display='none';toast('✔ Issue resolved · +20 pts 🎉');}

async function doUpvote(id){await fetch('/upvote/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});toast('⬆ +2 pts');load();}
function doVerify(id){const pwd=prompt('🔒 Admin password:');if(pwd===null)return;fetch('/verify/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admin_password:pwd})}).then(r=>r.json()).then(d=>{if(d.error)toast(d.error,'error');else{toast('✓ Verified · +5 pts');load();}});}
async function doResolve(id){const res=await fetch('/resolve/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});const d=await res.json();load();if(d.nearby_ngos&&d.nearby_ngos.length)showNgoPop(d.nearby_ngos);else toast('✔ Resolved · +20 pts 🎉');}
async function doEscalate(id){await fetch('/ngo/escalate/'+id,{method:'POST',headers:{'Content-Type':'application/json'}});toast('↑ Escalated to NGO','ngo');load();}

loadAreas();load();
</script>
</body>
</html>
