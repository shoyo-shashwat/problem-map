<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AreaPulse</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
header { background:#1a1a2e; color:white; padding:16px; text-align:center; }

.container { max-width:1000px; margin:20px auto; }

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input, select, textarea {
  width:100%; padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn { background:#1a1a2e; color:white; }

.issue {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #eee;
}

#map { height:350px; }

.lb { display:flex; justify-content:space-between; }
</style>
</head>

<body>

<header><h2>AreaPulse 🚀</h2></header>

<div class="container">

<div class="card">
<h3>Report Issue</h3>
<input id="user" placeholder="Your name">
<select id="area">
<option value="">Select Area</option>
<option>Rohini</option>
<option>Dwarka</option>
<option>Janakpuri</option>
<option>Lajpat Nagar</option>
<option>Saket</option>
<option>Karol Bagh</option>
<option>Pitampura</option>
<option>Vasant Kunj</option>
</select>
<textarea id="desc" placeholder="Describe issue"></textarea>
<button class="btn" onclick="submitIssue()">Submit</button>
</div>

<div class="card"><h3>Map</h3><div id="map"></div></div>

<div class="card"><h3>Leaderboard</h3><div id="lb"></div></div>

<div class="card"><h3>Issues</h3><div id="issues"></div></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([28.6,77.2],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function submitIssue(){
  const user = document.getElementById('user').value || "anonymous";
  const area = document.getElementById('area').value;
  const desc = document.getElementById('desc').value;

  if(!area || !desc){
    alert("Fill all fields");
    return;
  }

  try {
    const res = await fetch('/report', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        user: user,
        area: area,
        description: desc
      })
    });

    if(!res.ok){
      alert("Server error");
      return;
    }

    const data = await res.json();
    console.log("SUCCESS:", data);

    // ✅ RESET FORM (THIS WAS MISSING)
    document.getElementById('user').value = "";
    document.getElementById('area').value = "";
    document.getElementById('desc').value = "";

    alert("Submitted!");

    loadAll();

  } catch(err){
    console.error(err);
    alert("Error connecting to server");
  }
}

async function loadAll(){
loadIssues();loadMap();loadLB();
}

async function loadIssues(){
let d=await (await fetch('/issues')).json();
document.getElementById('issues').innerHTML=d.map(i=>`
<div class="issue">
<div>${i.area}<br>${i.description}<br>${i.status}</div>
<div>
<button onclick="up(${i.id})">👍${i.upvotes}</button>
<button onclick="ver(${i.id})">✔</button>
<button onclick="res(${i.id})">✅</button>
</div>
</div>`).join('');
}

async function up(id){await fetch('/upvote/'+id,{method:'POST'});loadAll();}
async function ver(id){await fetch('/verify/'+id,{method:'POST'});loadAll();}
async function res(id){await fetch('/resolve/'+id,{method:'POST'});loadAll();}

async function loadLB(){
let d=await (await fetch('/leaderboard')).json();
document.getElementById('lb').innerHTML=d.map((u,i)=>`
<div class="lb">#${i+1} ${u.name}<span>${u.points}</span></div>`).join('');
}

async function loadMap(){
let d=await (await fetch('/map-data')).json();
map.eachLayer(l=>{if(l instanceof L.Circle) map.removeLayer(l);});
d.forEach(a=>{
L.circle([a.lat,a.lng],{radius:3000,color:a.heat=="high"?"red":"orange"})
.addTo(map).bindPopup(a.area);
});
}

loadAll();
</script>

</body>
</html>
