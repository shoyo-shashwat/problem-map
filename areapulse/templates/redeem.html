<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redeem — AreaPulse</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=cabinet-grotesk@300,400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.redeem-wrap{max-width:900px;margin:0 auto;padding:36px 28px 80px;position:relative;z-index:1}
.user-bar{display:flex;gap:10px;align-items:center;margin-bottom:30px;flex-wrap:wrap}
.user-bar input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 16px;border-radius:var(--radius-sm);outline:none;height:42px;width:240px;transition:all 0.2s}
.user-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,126,248,0.1)}
.check-btn{height:42px;padding:0 18px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--font-body);font-size:13px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s}
.check-btn:hover{border-color:var(--accent);color:var(--accent)}
.pts-banner{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(79,126,248,0.12),rgba(124,92,252,0.08));border:1px solid rgba(79,126,248,0.25);border-radius:14px;padding:14px 24px;margin-bottom:28px}
.pts-banner .big{font-family:var(--font-display);font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cat-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.cat-tab{font-family:var(--font-body);font-size:13px;font-weight:600;padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.2s}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{background:rgba(79,126,248,0.1);border-color:rgba(79,126,248,0.3);color:var(--accent)}
.rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
.reward-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all 0.2s;position:relative}
.reward-card.affordable{border-color:rgba(79,126,248,0.2)}
.reward-card.affordable:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.4)}
.reward-card.locked{opacity:0.45;cursor:not-allowed}
.reward-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.reward-icon{font-size:28px}
.reward-cat{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.reward-title{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--text)}
.reward-footer{display:flex;align-items:center;justify-content:space-between}
.reward-pts{font-family:var(--font-display);font-weight:700;font-size:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.redeem-btn{font-family:var(--font-body);font-size:12px;font-weight:700;padding:7px 16px;border-radius:7px;border:none;cursor:pointer;transition:all 0.2s;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
.redeem-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.redeem-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;filter:none;background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;display:flex;align-items:center;justify-content:center}
.success-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px;text-align:center;max-width:380px;animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes pop{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.success-icon{font-size:54px;margin-bottom:16px}
.success-title{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--text);margin-bottom:8px}
.success-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.success-pts{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--green);margin-bottom:22px}
.success-close{background:var(--accent);color:white;border:none;font-family:var(--font-display);font-size:14px;font-weight:700;padding:12px 30px;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><div class="brand-dot"></div><span class="brand-name">AreaPulse</span><span class="brand-tag">Delhi</span></div>
    <div class="nav-center">
    <a href="/" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Live Map</a>
    <a href="/issues-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Issues</a>
    <a href="/leaderboard-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>Leaderboard</a>
    <a href="/ngo-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>NGOs</a>
    <a href="/community-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Community</a>
    <a href="/redeem-page" class="nav-link active"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Redeem</a>
  </div>
  <div class="nav-right"><div class="live-badge"><span class="live-dot"></span>Live</div></div>
</nav>
<div class="redeem-wrap">
  <div class="page-hero"><div><h1 class="page-title">Redeem <span>Credits</span></h1><p class="page-subtitle">Exchange your civic points for real rewards</p></div></div>
  <div class="user-bar">
    <input id="ru" type="text" placeholder="Enter your name..." autocomplete="off">
    <button class="check-btn" onclick="checkPts()">Check My Points →</button>
  </div>
  <div id="pts-banner" style="display:none" class="pts-banner">
    <span style="font-size:24px">⭐</span>
    <div><div class="big" id="pts-val">0</div><div style="font-size:12px;color:var(--text2)">available points</div></div>
    <div style="width:1px;height:36px;background:var(--border);margin:0 8px"></div>
    <div style="font-size:12px;color:var(--text2)">Earn by reporting<br>verifying & resolving</div>
  </div>
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" onclick="filterCat('',this)">All</button>
    <button class="cat-tab" onclick="filterCat('Transport',this)">🚇 Transport</button>
    <button class="cat-tab" onclick="filterCat('Cash',this)">💸 Cash</button>
    <button class="cat-tab" onclick="filterCat('Shopping',this)">🛒 Shopping</button>
    <button class="cat-tab" onclick="filterCat('Food',this)">🍔 Food</button>
    <button class="cat-tab" onclick="filterCat('Green',this)">🌱 Green</button>
    <button class="cat-tab" onclick="filterCat('Recognition',this)">🏅 Recognition</button>
  </div>
  <div class="rewards-grid" id="rewards-grid"><div class="loading-state"><div class="spinner"></div></div></div>
</div>
<div id="success-overlay" class="success-overlay" style="display:none">
  <div class="success-box">
    <div class="success-icon">🎉</div>
    <div class="success-title" id="s-title">Reward Redeemed!</div>
    <div class="success-sub" id="s-sub"></div>
    <div class="success-pts" id="s-pts"></div>
    <button class="success-close" onclick="document.getElementById('success-overlay').style.display='none'">Awesome!</button>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
let allRewards=[], userPts=0, currentUser='', activeCat='';
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3500)}
async function checkPts() {
  const name=document.getElementById('ru').value.trim();
  if(!name){showToast('Enter your name','error');return;}
  currentUser=name;
  const d=await(await fetch('/user/points?name='+encodeURIComponent(name))).json();
  userPts=d.points||0;
  document.getElementById('pts-val').textContent=userPts;
  document.getElementById('pts-banner').style.display='flex';
  renderRewards(allRewards);
  showToast(userPts?`You have ${userPts} points!`:'No points yet. Report issues to earn!',userPts?'success':'ngo');
}
function filterCat(cat,el){
  activeCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderRewards(allRewards);
}
function renderRewards(rewards) {
  const grid=document.getElementById('rewards-grid');
  const filtered=activeCat?rewards.filter(r=>r.category===activeCat):rewards;
  grid.innerHTML=filtered.map(r=>{
    const can=userPts>=r.points;
    return `<div class="reward-card ${can?'affordable':'locked'}">
      <div class="reward-top">
        <span class="reward-icon">${r.icon}</span>
        <div><div class="reward-cat">${r.category}</div><div class="reward-title">${r.title}</div></div>
      </div>
      <div class="reward-footer">
        <span class="reward-pts">${r.points} pts</span>
        <button class="redeem-btn" onclick="redeem(${r.id})" ${can&&currentUser?'':'disabled'}>${can?'Redeem →':'Need '+(r.points-userPts)+' more'}</button>
      </div>
    </div>`;
  }).join('');
}
async function redeem(rid) {
  if(!currentUser){showToast('Enter name and check points first','error');return;}
  const res=await fetch('/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:currentUser,reward_id:rid})});
  const d=await res.json();
  if(d.status==='redeemed'){
    userPts=d.remaining_points;
    document.getElementById('pts-val').textContent=userPts;
    document.getElementById('s-title').textContent=d.reward.title+' Redeemed!';
    document.getElementById('s-sub').textContent=`Claimed for ${d.reward.points} points.`;
    document.getElementById('s-pts').textContent=`Remaining: ${d.remaining_points} pts`;
    document.getElementById('success-overlay').style.display='flex';
    renderRewards(allRewards);
  } else showToast(d.error||'Error','error');
}
async function load(){allRewards=await(await fetch('/rewards')).json();renderRewards(allRewards);}
document.getElementById('ru').addEventListener('keydown',e=>{if(e.key==='Enter')checkPts();});
load();
</script>
</body>
</html>
