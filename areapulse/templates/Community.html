<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — AreaPulse</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=cabinet-grotesk@300,400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.comm-wrap{max-width:780px;margin:0 auto;padding:32px 28px 80px;position:relative;z-index:1}
.composer{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;margin-bottom:24px}
.composer-top{display:flex;gap:9px;margin-bottom:10px;flex-wrap:wrap}
.composer-top input,.composer-top select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-body);font-size:13px;padding:8px 12px;border-radius:9px;outline:none;height:38px;transition:all 0.2s}
.composer-top input:focus,.composer-top select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,126,248,0.1)}
#post-user{width:150px}
.comm-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-body);font-size:13.5px;padding:11px 13px;border-radius:9px;outline:none;resize:vertical;min-height:75px;line-height:1.6;transition:all 0.2s;margin-bottom:10px}
.comm-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,126,248,0.1)}
.comm-textarea::placeholder{color:var(--text3)}
.composer-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px}
.type-btns{display:flex;gap:5px;flex-wrap:wrap}
.type-btn{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.2s}
.type-btn:hover{color:var(--text)}
.type-btn.sel-update{border-color:rgba(79,126,248,0.4);color:var(--accent);background:rgba(79,126,248,0.08)}
.type-btn.sel-alert{border-color:rgba(255,64,105,0.4);color:var(--red);background:rgba(255,64,105,0.08)}
.type-btn.sel-success{border-color:rgba(31,209,138,0.4);color:var(--green);background:rgba(31,209,138,0.08)}
.type-btn.sel-event{border-color:rgba(255,201,74,0.4);color:var(--yellow);background:rgba(255,201,74,0.08)}
.type-btn.sel-tip{border-color:rgba(124,92,252,0.4);color:var(--accent2);background:rgba(124,92,252,0.08)}
.post-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;font-family:var(--font-display);font-size:13px;font-weight:600;padding:0 18px;height:36px;border-radius:9px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(79,126,248,0.3)}
.post-btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.post-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.feed-filters{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.feed-filter-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-body);font-size:12.5px;padding:6px 11px;border-radius:9px;outline:none;height:34px}
.feed-filter-btn{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.2s}
.feed-filter-btn:hover,.feed-filter-btn.active{color:var(--accent);border-color:rgba(79,126,248,0.3);background:rgba(79,126,248,0.07)}
.feed{display:flex;flex-direction:column;gap:11px}
.post{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:all 0.2s}
.post:hover{border-color:var(--border2)}
.post-top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.post-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px;color:white;flex-shrink:0}
.post-meta{flex:1;min-width:0}
.post-user{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text)}
.post-info{font-size:10.5px;color:var(--text3);margin-top:1px}
.post-type{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;flex-shrink:0}
.post-type.update{background:rgba(79,126,248,0.1);color:var(--accent)}
.post-type.alert{background:rgba(255,64,105,0.1);color:var(--red)}
.post-type.success{background:rgba(31,209,138,0.1);color:var(--green)}
.post-type.event{background:rgba(255,201,74,0.1);color:var(--yellow)}
.post-type.tip{background:rgba(124,92,252,0.1);color:var(--accent2)}
.post-msg{font-size:13.5px;color:var(--text2);line-height:1.7;margin-bottom:11px}
.post-footer{display:flex;align-items:center;gap:11px}
.like-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 11px;cursor:pointer;transition:all 0.2s}
.like-btn:hover{color:var(--red);border-color:rgba(255,64,105,0.3);background:rgba(255,64,105,0.06)}
.like-btn.liked{color:var(--red);border-color:rgba(255,64,105,0.3);background:rgba(255,64,105,0.08)}
.area-pill{font-size:10px;font-weight:700;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 9px}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><div class="brand-dot"></div><span class="brand-name">AreaPulse</span><span class="brand-tag">Delhi</span></div>
  <div class="nav-center">
    <a href="/" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>Live Map</a>
    <a href="/issues-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Issues</a>
    <a href="/leaderboard-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>Leaderboard</a>
    <a href="/ngo-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>NGOs</a>
    <a href="/community-page" class="nav-link active"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Community</a>
    <a href="/redeem-page" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Redeem</a>
  </div>
  <div class="nav-right"><div class="live-badge"><span class="live-dot"></span>Live</div></div>
</nav>

<div class="comm-wrap">
  <div class="page-hero"><div><h1 class="page-title">Community <span>Forum</span></h1><p class="page-subtitle">Share updates, alerts, tips & events · +3 pts per post · Auto-refreshes every 30s</p></div></div>

  <div class="composer">
    <div class="composer-top">
      <input id="post-user" type="text" placeholder="Your name..." autocomplete="off">
      <select id="post-area"><option value="Delhi">All Delhi</option></select>
    </div>
    <textarea id="post-msg" class="comm-textarea" placeholder="Share an update, warn about a danger, announce a clean-up event, or post a civic tip..."></textarea>
    <div class="composer-footer">
      <div class="type-btns">
        <button class="type-btn sel-update" id="pt-update" onclick="setType('update',this)">📢 Update</button>
        <button class="type-btn" id="pt-alert"   onclick="setType('alert',this)">🚨 Alert</button>
        <button class="type-btn" id="pt-success" onclick="setType('success',this)">✅ Success</button>
        <button class="type-btn" id="pt-event"   onclick="setType('event',this)">📅 Event</button>
        <button class="type-btn" id="pt-tip"     onclick="setType('tip',this)">💡 Tip</button>
      </div>
      <button class="post-btn" id="post-submit-btn" onclick="submitPost()">Post →</button>
    </div>
  </div>

  <div class="feed-filters">
    <select class="feed-filter-select" id="feed-area" onchange="loadPosts()"><option value="">All Areas</option></select>
    <button class="feed-filter-btn active" onclick="filterType('',this)">All</button>
    <button class="feed-filter-btn" onclick="filterType('alert',this)">🚨 Alerts</button>
    <button class="feed-filter-btn" onclick="filterType('success',this)">✅ Success</button>
    <button class="feed-filter-btn" onclick="filterType('event',this)">📅 Events</button>
    <button class="feed-filter-btn" onclick="filterType('tip',this)">💡 Tips</button>
  </div>

  <div class="feed" id="feed"><div class="loading-state"><div class="spinner"></div><p>Loading community posts...</p></div></div>
</div>

<div id="toast" class="toast"></div>

<script>
let selType='update',typeFilter='',allPosts=[];
const liked=new Set(JSON.parse(localStorage.getItem('likedPosts')||'[]'));
const typeEmojis={update:'📢',alert:'🚨',success:'✅',event:'📅',tip:'💡'};

function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3500);}
function timeAgo(ts){const d=(Date.now()/1000)-ts;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}

function setType(t,el){selType=t;document.querySelectorAll('.type-btn').forEach(b=>{b.className='type-btn';});el.className=`type-btn sel-${t}`;}
function filterType(t,el){typeFilter=t;document.querySelectorAll('.feed-filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderPosts();}

function renderPosts(){
  const feed=document.getElementById('feed');
  const posts=typeFilter?allPosts.filter(p=>p.post_type===typeFilter):allPosts;
  if(!posts.length){feed.innerHTML='<div class="empty-state"><strong>No posts yet.</strong><br>Be the first to share!</div>';return;}
  feed.innerHTML=posts.map(p=>{
    const isLiked=liked.has(p.id);const pt=p.post_type||'update';
    return`<div class="post">
      <div class="post-top"><div class="post-avatar">${p.user.charAt(0).toUpperCase()}</div><div class="post-meta"><div class="post-user">${p.user}</div><div class="post-info">${timeAgo(p.timestamp)}${p.area&&p.area!=='Delhi'?' · '+p.area:''}</div></div><span class="post-type ${pt}">${typeEmojis[pt]||'📢'} ${pt}</span></div>
      <div class="post-msg">${p.message}</div>
      <div class="post-footer"><button class="like-btn ${isLiked?'liked':''}" onclick="likePost(${p.id},this)">${isLiked?'❤️':'🤍'} ${p.likes}</button>${p.area&&p.area!=='Delhi'?`<span class="area-pill">📍 ${p.area}</span>`:''}</div>
    </div>`;
  }).join('');
}

async function loadAreas(){
  const areas=await(await fetch('/areas')).json();
  const s1=document.getElementById('post-area'),s2=document.getElementById('feed-area');
  areas.forEach(a=>{[s1,s2].forEach(s=>{const o=document.createElement('option');o.value=a;o.textContent=a;s.appendChild(o);});});
}

async function loadPosts(){
  const area=document.getElementById('feed-area').value;
  const url=area?`/community/posts?area=${encodeURIComponent(area)}`:'/community/posts';
  allPosts=await(await fetch(url)).json();
  renderPosts();
}

async function submitPost(){
  const user=document.getElementById('post-user').value.trim();
  const area=document.getElementById('post-area').value;
  const msg=document.getElementById('post-msg').value.trim();
  if(!user||!msg){toast('Name and message required','error');return;}
  if(msg.length<5){toast('Message too short','error');return;}
  const btn=document.getElementById('post-submit-btn');btn.disabled=true;btn.textContent='Posting...';
  const res=await fetch('/community/post',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,area,message:msg,type:selType})});
  const d=await res.json();
  btn.disabled=false;btn.textContent='Post →';
  if(d.status==='ok'){toast('Posted! +3 pts 🎉');document.getElementById('post-msg').value='';loadPosts();}
  else toast(d.error||'Error','error');
}

async function likePost(id,btn){
  if(liked.has(id)){toast('Already liked!','error');return;}
  const user=document.getElementById('post-user').value.trim();
  if(!user){toast('Enter your name above to like posts','error');return;}
  const res=await fetch(`/community/like/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user})});
  const d=await res.json();
  if(d.status==='ok'){liked.add(id);localStorage.setItem('likedPosts',JSON.stringify([...liked]));loadPosts();}
  else toast(d.error||'Error','error');
}

loadAreas();loadPosts();
setInterval(loadPosts,30000);
</script>
</body>
</html>
