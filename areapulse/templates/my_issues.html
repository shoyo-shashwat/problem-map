{% extends "base.html" %}
{% block title %}My Reports — Problem Map{% endblock %}

{% block content %}
<div class="my-issues-wrap">
  <div class="flex items-center justify-between mb-16">
    <div>
      <div class="section-title">My Reports</div>
      <div class="section-sub">Issues reported by {{ current_user }}</div>
    </div>
    <a href="/" class="btn btn-primary btn-sm">+ New Report</a>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stats-card"><div class="num" id="s-total">—</div><div class="lbl">Reported</div></div>
    <div class="stats-card"><div class="num" id="s-resolved" style="color:var(--green)">—</div><div class="lbl">Resolved</div></div>
    <div class="stats-card"><div class="num" id="s-open" style="color:var(--blue)">—</div><div class="lbl">Open</div></div>
    <div class="stats-card"><div class="num" id="s-points" style="color:var(--accent)">—</div><div class="lbl">Points</div></div>
  </div>

  <!-- Issues list -->
  <div class="issues-list" id="issues-list">
    <div style="text-align:center;padding:40px">
      <div class="spinner" style="margin:0 auto 10px"></div>
      <div class="text-muted">Loading your reports…</div>
    </div>
  </div>
</div>
{% endblock %}
